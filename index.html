<!DOCTYPE html>
<html>
<head>
<title>Quiz Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="startScreen" class="screen">
<h1>CHAUDHARY QUIZ WORLD</h1>
<input type="text" id="playerName" placeholder="Enter Your Name">
<br><br>
<button onclick="startGame()">Start Game</button>
</div>

<div id="quizScreen" class="screen hidden">

<div id="topBar">
<span id="playerDisplay"></span>
<span id="scoreDisplay">Score: 0</span>
<span id="levelDisplay">Level: 1</span>
<span id="timerDisplay">Time: 10</span>
</div>

<div id="progressBarContainer">
<div id="progressBar"></div>
</div>

<h2 id="question"></h2>
<div id="options"></div>
<p id="feedback"></p>

</div>

<canvas id="confetti"></canvas>

<audio id="correctSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_correct.mp3"></audio>
<audio id="wrongSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_wrong.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
