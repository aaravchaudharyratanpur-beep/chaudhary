<!DOCTYPE html>
<html>
<head>
<title>Endless Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="startScreen" class="screen">
<h1>🌍 Endless Quiz</h1>
<input type="text" id="playerName" placeholder="Enter your name">
<button onclick="startGame()">Start Game</button>
</div>

<div id="gameScreen" class="screen hidden">

<div class="progressBar">
<div id="progressFill"></div>
</div>

<h2 id="level"></h2>
<h2 id="timer"></h2>
<h2 id="question"></h2>

<div id="options"></div>

<div id="feedback"></div>

<h3 id="score"></h3>

</div>

<div id="gameOverScreen" class="screen hidden">
<h1>Game Over</h1>
<h2 id="finalScore"></h2>
<button onclick="restartGame()">Play Again</button>
</div>

<canvas id="confetti"></canvas>

<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
<audio id="wrongSound" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
<audio id="bgMusic" loop src="https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
